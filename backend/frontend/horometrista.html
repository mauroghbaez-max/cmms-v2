<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTEN. — Horometrista</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --az1:#0a1628;--az2:#0d2240;--az3:#1a3a6b;--az4:#2563a8;
  --cel1:#378add;--cel2:#5ba3e8;--cel3:#b5d4f4;
  --txt1:#e8f0fc;--txt2:#94b8e0;--txt3:#5a7fa8;
  --ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --r:14px;--r-sm:10px;--border:rgba(55,138,221,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--az1);color:var(--txt1);font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif;font-style:italic;min-height:100vh;}
nav{background:var(--az2);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;}
.logo{font-size:22px;font-weight:700;color:var(--cel2);letter-spacing:0.12em;}
.rol-badge{background:var(--az3);color:var(--cel3);font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--cel1);}
.nav-name{color:var(--txt2);font-size:13px;}
.spacer{flex:1;}
.btn-nav{background:transparent;border:0.5px solid var(--border);color:var(--txt2);padding:5px 14px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;font-size:12px;}
.btn-nav:hover{background:var(--az3);color:var(--txt1);}
main{padding:24px;max-width:1000px;margin:0 auto;}
h2{font-size:13px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.btn{background:var(--az4);border:0.5px solid var(--cel1);color:var(--txt1);padding:9px 18px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;font-size:13px;}
.btn:hover{background:var(--cel1);}
.btn-warn{background:rgba(245,158,11,0.1);border:0.5px solid rgba(245,158,11,0.4);color:var(--warn);}
.btn-warn:hover{background:rgba(245,158,11,0.2);}
input,textarea{background:var(--az1);border:0.5px solid var(--border);border-radius:var(--r-sm);color:var(--txt1);padding:9px 12px;font-style:italic;font-family:inherit;font-size:13px;outline:none;}
input:focus,textarea:focus{border-color:var(--cel1);}
.search{width:280px;}
.tabla{width:100%;border-collapse:collapse;}
.tabla th{font-size:10px;color:var(--txt3);padding:8px 12px;text-align:left;text-transform:uppercase;letter-spacing:0.08em;border-bottom:0.5px solid var(--border);}
.tabla td{padding:10px 12px;font-size:13px;border-bottom:0.5px solid var(--border);}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr:hover td{background:rgba(37,99,168,0.06);}
.hs{font-size:18px;font-weight:700;color:var(--cel2);}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:var(--az3);color:var(--txt1);cursor:pointer;font-style:italic;font-family:inherit;}
.btn-sm:hover{background:var(--az4);}
.btn-sm-warn{border-color:rgba(245,158,11,0.4);color:var(--warn);background:rgba(245,158,11,0.08);}
.btn-sm-warn:hover{background:rgba(245,158,11,0.15);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal h3{color:var(--cel2);margin-bottom:6px;font-size:16px;}
.modal-sub{font-size:12px;color:var(--txt3);margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.field input,.field textarea{width:100%;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.alert-warn{background:rgba(245,158,11,0.08);border:0.5px solid rgba(245,158,11,0.3);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--warn);margin-bottom:14px;}
</style>
</head>
<body>

<nav>
  <span class="logo">MANTEN.</span>
  <span class="rol-badge">Horometrista</span>
  <span class="nav-name" id="nav-name"></span>
  <span class="spacer"></span>
  <button class="btn-nav" onclick="salir()">Salir</button>
</nav>

<main>
  <h2>Equipos Activos</h2>
  <div class="toolbar">
    <input type="text" class="search" placeholder="Buscar equipo..." oninput="filtrar(this.value)">
    <button class="btn" onclick="abrirScanner()">📷 Escanear QR</button>
  </div>
  <table class="tabla">
    <thead>
      <tr>
        <th>Equipo</th><th>Código</th><th>Ubicación</th>
        <th>Horómetro</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<!-- Modal nueva lectura -->
<div class="overlay" id="overlay-lectura">
  <div class="modal">
    <h3>Cargar horómetro</h3>
    <div class="modal-sub" id="lectura-equipo-nombre"></div>
    <div class="field">
      <label>Nueva lectura (hs) *</label>
      <input id="f-lectura" type="number" step="0.1" placeholder="Ingresá las horas actuales">
    </div>
    <div class="field">
      <label>Observaciones</label>
      <textarea id="f-obs" rows="2" placeholder="Opcional..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="cerrarModal('overlay-lectura')">Cancelar</button>
      <button class="btn" onclick="guardarLectura()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal corrección horómetro -->
<div class="overlay" id="overlay-correccion">
  <div class="modal">
    <h3>Corregir horómetro</h3>
    <div class="modal-sub" id="correccion-equipo-nombre"></div>
    <div class="alert-warn">
      Solo podés corregir la carga del día de hoy. El cambio queda registrado.
    </div>
    <div class="field">
      <label>Valor correcto (hs) *</label>
      <input id="f-correccion" type="number" step="0.1" placeholder="Ingresá el valor correcto">
    </div>
    <div class="field">
      <label>Motivo de la corrección</label>
      <textarea id="f-correccion-obs" rows="2" placeholder="Opcional — explicá el error..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="cerrarModal('overlay-correccion')">Cancelar</button>
      <button class="btn btn-warn" onclick="guardarCorreccion()">Corregir</button>
    </div>
  </div>
</div>

<!-- Modal scanner QR -->
<div class="overlay" id="overlay-scanner">
  <div class="modal">
    <h3>Escanear QR</h3>
    <div id="qr-reader" style="width:280px;margin:16px auto 0;"></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="cerrarScanner()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const API = 'https://cmms-v2-production.up.railway.app/api/v1';
let token = localStorage.getItem('manten_token');
let user = JSON.parse(localStorage.getItem('manten_user') || '{}');
let equipos = [];
let equipoSelId = null;
let scanner = null;

if (!token) window.location.href = 'index.html';
document.getElementById('nav-name').textContent = user.nombre_completo || '';

async function api(method, path, body) {
  const opts = { method, headers: { Authorization: 'Bearer ' + token } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(API + path, opts);
  if (r.status === 401) { salir(); return null; }
  return r.json();
}

async function cargar() {
  equipos = await api('GET', '/horometrista/equipos') || [];
  renderizar(equipos);
}

function renderizar(lista) {
  const tb = document.getElementById('tbody');
  if (!lista.length) {
    tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--txt3);padding:24px;">Sin equipos</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(e => `
    <tr>
      <td style="font-weight:700;">${e.nombre}</td>
      <td style="color:var(--cel2);font-size:11px;">${e.codigo_interno}</td>
      <td style="color:var(--txt3);">${e.ubicacion || '—'}</td>
      <td><span class="hs">${(e.horometro_actual || 0).toLocaleString()} hs</span></td>
      <td style="display:flex;gap:6px;">
        <button class="btn-sm" onclick="abrirLectura('${e.id}','${e.nombre}',${e.horometro_actual||0})">+ Lectura</button>
        <button class="btn-sm btn-sm-warn" onclick="abrirCorreccion('${e.id}','${e.nombre}',${e.horometro_actual||0})">Corregir</button>
      </td>
    </tr>
  `).join('');
}

function filtrar(q) {
  const filtrados = equipos.filter(e =>
    e.nombre.toLowerCase().includes(q.toLowerCase()) ||
    e.codigo_interno.toLowerCase().includes(q.toLowerCase())
  );
  renderizar(filtrados);
}

// ─── NUEVA LECTURA ─────────────────────────────────────────────────

function abrirLectura(id, nombre, actual) {
  equipoSelId = id;
  document.getElementById('lectura-equipo-nombre').textContent = nombre + ' — Actual: ' + actual.toLocaleString() + ' hs';
  document.getElementById('f-lectura').value = '';
  document.getElementById('f-obs').value = '';
  document.getElementById('overlay-lectura').classList.add('show');
}

async function guardarLectura() {
  const lectura = parseFloat(document.getElementById('f-lectura').value);
  if (!lectura) { alert('Ingresá la lectura'); return; }
  const r = await api('POST', '/horometrista/horometros', {
    equipo_id: equipoSelId,
    lectura,
    observaciones: document.getElementById('f-obs').value || null
  });
  if (r) { cerrarModal('overlay-lectura'); cargar(); }
}

// ─── CORRECCIÓN ────────────────────────────────────────────────────

function abrirCorreccion(id, nombre, actual) {
  equipoSelId = id;
  document.getElementById('correccion-equipo-nombre').textContent = nombre + ' — Actual: ' + actual.toLocaleString() + ' hs';
  document.getElementById('f-correccion').value = '';
  document.getElementById('f-correccion-obs').value = '';
  document.getElementById('overlay-correccion').classList.add('show');
}

async function guardarCorreccion() {
  const lectura = parseFloat(document.getElementById('f-correccion').value);
  if (!lectura) { alert('Ingresá el valor correcto'); return; }
  const r = await api('PUT', `/horometrista/horometros/${equipoSelId}/corregir`, {
    lectura,
    motivo: 'Corrección del horometrista',
    observaciones: document.getElementById('f-correccion-obs').value || null
  });
  if (r) {
    alert('Horómetro corregido.');
    cerrarModal('overlay-correccion');
    cargar();
  }
}

// ─── SCANNER QR ────────────────────────────────────────────────────

function abrirScanner() {
  document.getElementById('overlay-scanner').classList.add('show');
  scanner = new Html5Qrcode('qr-reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: 220 },
    (codigo) => {
      cerrarScanner();
      const equipo = equipos.find(e => e.codigo_interno === codigo);
      if (equipo) {
        abrirLectura(equipo.id, equipo.nombre, equipo.horometro_actual || 0);
      } else {
        alert('Equipo no encontrado: ' + codigo);
      }
    },
    () => {}
  ).catch(() => alert('No se pudo acceder a la cámara'));
}

function cerrarScanner() {
  if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
  document.getElementById('overlay-scanner').classList.remove('show');
}

// ─── UTILS ─────────────────────────────────────────────────────────

function cerrarModal(id) {
  document.getElementById(id).classList.remove('show');
}

window.onclick = e => {
  ['overlay-lectura','overlay-correccion','overlay-scanner'].forEach(id => {
    if (e.target === document.getElementById(id)) cerrarModal(id);
  });
};

function salir() {
  localStorage.clear();
  window.location.href = 'index.html';
}

cargar();
</script>
</body>
</html>
