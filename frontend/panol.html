<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pañol — MANTEN.</title>
<style>
:root{
  --az1:#0a1628;--az2:#0d2240;--az3:#1a3a6b;--az4:#2563a8;
  --cel1:#378add;--cel2:#5ba3e8;--cel3:#b5d4f4;
  --txt1:#e8f0fc;--txt2:#94b8e0;--txt3:#5a7fa8;
  --ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --r:14px;--r-sm:10px;--border:rgba(55,138,221,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--az1);color:var(--txt1);font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif;font-style:italic;min-height:100vh;}
.topbar{background:var(--az2);border-bottom:0.5px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:700;color:var(--cel2);letter-spacing:0.12em;}
.role-pill{background:rgba(37,99,168,0.25);color:var(--cel2);font-size:11px;padding:3px 12px;border-radius:20px;border:0.5px solid rgba(91,163,232,0.3);}
.user-name{color:var(--txt2);font-size:13px;}
.nav{display:flex;gap:4px;}
.nav-btn{background:none;border:none;color:#d8e8f5;font-size:13px;padding:7px 16px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;}
.nav-btn.act{background:rgba(37,99,168,0.25);color:#f0f6ff;border:0.5px solid rgba(91,163,232,0.35);font-weight:700;}
.btn-salir{background:none;border:0.5px solid var(--border);color:#d8e8f5;font-size:13px;padding:7px 16px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;}
.main{padding:20px 24px;max-width:1200px;margin:0 auto;}
.panel{display:none;}.panel.act{display:block;}
.section-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--cel3);margin:18px 0 10px;}
.card{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.btn{font-size:12px;padding:8px 16px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:rgba(37,99,168,0.15);color:var(--cel3);cursor:pointer;font-style:italic;font-family:inherit;}
.btn:hover{border-color:var(--cel1);color:var(--cel2);}
.btn-primary{background:var(--az4);border-color:var(--cel1);color:var(--txt1);}
.btn-ok{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:var(--ok);}
.btn-ok:hover{background:rgba(16,185,129,0.2);}
.btn-sm{font-size:11px;padding:4px 10px;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;}
.badge-ok{background:rgba(16,185,129,0.15);color:var(--ok);border:0.5px solid rgba(16,185,129,0.3);}
.badge-off{background:rgba(239,68,68,0.1);color:var(--danger);border:0.5px solid rgba(239,68,68,0.3);}
.badge-warn{background:rgba(245,158,11,0.1);color:var(--warn);border:0.5px solid rgba(245,158,11,0.3);}
.badge-rol{background:rgba(37,99,168,0.2);color:var(--cel2);border:0.5px solid rgba(91,163,232,0.25);}
.badge-urgente{background:rgba(239,68,68,0.2);color:#ff6b6b;border:0.5px solid rgba(239,68,68,0.4);font-weight:700;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);padding:8px 12px;border-bottom:0.5px solid var(--border);}
.tbl td{padding:9px 12px;border-bottom:0.5px solid var(--border);color:var(--txt1);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(37,99,168,0.08);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--cel2);}
.divider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
.item-entrega{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.item-entrega:last-child{border-bottom:none;}
.item-check{width:20px;height:20px;border-radius:4px;border:0.5px solid var(--border);background:var(--az1);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-check.checked{background:var(--ok);border-color:var(--ok);}
.empty{color:var(--txt3);font-size:13px;padding:24px;text-align:center;}
.loading{color:var(--txt3);font-size:13px;padding:16px;text-align:center;}
.counter{font-size:11px;background:var(--danger);color:#fff;border-radius:10px;padding:1px 7px;margin-left:6px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.06em;}
.fg input,.fg textarea{background:var(--az1);border:0.5px solid var(--border);border-radius:var(--r-sm);color:var(--txt1);font-size:13px;padding:9px 12px;outline:none;font-style:italic;font-family:inherit;width:100%;}
.fg input:focus,.fg textarea:focus{border-color:var(--cel1);}
.orden-card{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.orden-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="row" style="gap:14px;">
    <span class="logo">MANTEN.</span>
    <span class="role-pill">Pañol</span>
    <span class="user-name" id="user-name"></span>
  </div>
  <div class="nav">
    <button class="nav-btn act" id="btn-ordenes" onclick="setPanel('ordenes',this)">Órdenes</button>
    <button class="nav-btn" id="btn-preventivos" onclick="setPanel('preventivos',this)">Preventivos</button>
  </div>
  <button class="btn-salir" onclick="logout()">Salir</button>
</div>

<div class="main">

<!-- ═══ ÓRDENES PENDIENTES ═══ -->
<div class="panel act" id="panel-ordenes">
  <div class="row" style="justify-content:space-between;margin-bottom:14px;">
    <div class="section-title" style="margin:0;">Órdenes de entrega pendientes</div>
    <button class="btn" onclick="cargarOrdenes()">↺ Actualizar</button>
  </div>
  <div id="contenedor-ordenes"><div class="loading">Cargando...</div></div>
</div>

<!-- ═══ PEDIDOS PREVENTIVOS ═══ -->
<div class="panel" id="panel-preventivos">
  <div class="row" style="justify-content:space-between;margin-bottom:14px;">
    <div class="section-title" style="margin:0;">Pedidos preventivos — próximos servicios</div>
    <button class="btn" onclick="cargarPreventivos()">↺ Actualizar</button>
  </div>
  <div id="contenedor-preventivos"><div class="loading">Cargando...</div></div>
</div>

</div>

<!-- ═══ MODAL ENTREGA ═══ -->
<div class="modal-bg" id="modal-entrega">
  <div class="modal">
    <div class="modal-title" id="entrega-titulo">Confirmar entrega</div>
    <input type="hidden" id="entrega-ot-id">
    <input type="hidden" id="entrega-tipo">

    <div id="entrega-items"></div>
    <hr class="divider">

    <div class="fg" style="margin-bottom:14px;">
      <label>Nombre del operador que retira <span style="color:var(--danger);">*</span></label>
      <input type="text" id="entrega-firma" placeholder="Nombre y apellido">
    </div>
    <div class="fg" style="margin-bottom:16px;">
      <label>Observaciones</label>
      <input type="text" id="entrega-obs" placeholder="Opcional...">
    </div>
    <div class="row">
      <button class="btn btn-ok" onclick="confirmarEntrega()">✓ Confirmar entrega</button>
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const API = 'https://cmms-v2-production.up.railway.app/api/v1';
const TOKEN = localStorage.getItem('manten_token');
const USER = JSON.parse(localStorage.getItem('manten_user') || '{}');

if (!TOKEN) window.location.href = 'index.html';
if (USER.nombre_completo) document.getElementById('user-name').textContent = USER.nombre_completo;

async function api(path, opts={}) {
  const r = await fetch(API + path, {
    headers: {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...(opts.headers||{})},
    ...opts
  });
  if (r.status===401) { logout(); return null; }
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    throw new Error(e.detail || 'Error en el servidor');
  }
  return r.json();
}

function logout() {
  localStorage.removeItem('manten_token');
  localStorage.removeItem('manten_user');
  window.location.href = 'index.html';
}

function setPanel(nombre, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
  document.getElementById('panel-'+nombre).classList.add('act');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  if (nombre==='ordenes') cargarOrdenes();
  if (nombre==='preventivos') cargarPreventivos();
}

// ─── ÓRDENES ───────────────────────────────────────────────────────

async function cargarOrdenes() {
  document.getElementById('contenedor-ordenes').innerHTML = '<div class="loading">Cargando...</div>';
  try {
    const data = await api('/panol/ordenes') || [];
    const cont = document.getElementById('contenedor-ordenes');

    // Actualizar counter en nav
    const btn = document.getElementById('btn-ordenes');
    const counter = btn.querySelector('.counter');
    if (counter) counter.remove();
    if (data.length) btn.innerHTML = 'Órdenes<span class="counter">'+data.length+'</span>';

    if (!data.length) {
      cont.innerHTML = '<div class="empty">Sin órdenes pendientes</div>';
      return;
    }

    cont.innerHTML = data.map(o => `
      <div class="orden-card">
        <div class="orden-header">
          <div>
            <span style="font-size:15px;font-weight:700;color:var(--cel2);">${o.ot_numero}</span>
            ${o.urgente ? '<span class="badge badge-urgente" style="margin-left:8px;">URGENTE</span>' : ''}
            <span style="font-size:12px;color:var(--txt3);margin-left:8px;">${o.equipo_nombre} (${o.codigo_interno})</span>
          </div>
          <button class="btn btn-sm" onclick='verDetalleOT("${o.ot_id}")'>Ver OT</button>
        </div>

        ${o.items_epp.length ? `
        <div style="margin-bottom:12px;">
          <div class="section-title" style="margin-bottom:8px;">EPP a entregar</div>
          <table class="tbl">
            <thead><tr><th>Descripción</th><th>Cantidad</th><th>Unidad</th></tr></thead>
            <tbody>
              ${o.items_epp.map(i=>`<tr><td>${i.descripcion}</td><td>${i.cantidad}</td><td>${i.unidad}</td></tr>`).join('')}
            </tbody>
          </table>
          <div style="margin-top:8px;">
            <button class="btn btn-ok btn-sm" onclick='abrirEntrega("${o.ot_id}","epp","${o.ot_numero} — EPP")'>
              ✓ Confirmar entrega EPP
            </button>
          </div>
        </div>` : ''}

        ${o.items_material.length ? `
        <div>
          <div class="section-title" style="margin-bottom:8px;">Materiales a entregar</div>
          <table class="tbl">
            <thead><tr><th>Descripción</th><th>Cantidad</th><th>Unidad</th></tr></thead>
            <tbody>
              ${o.items_material.map(i=>`<tr><td>${i.descripcion}</td><td>${i.cantidad}</td><td>${i.unidad}</td></tr>`).join('')}
            </tbody>
          </table>
          <div style="margin-top:8px;">
            <button class="btn btn-ok btn-sm" onclick='abrirEntrega("${o.ot_id}","material","${o.ot_numero} — Materiales")'>
              ✓ Confirmar entrega materiales
            </button>
          </div>
        </div>` : ''}

        ${o.items_epp.length && o.items_material.length ? `
        <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);">
          <button class="btn btn-primary btn-sm" onclick='abrirEntrega("${o.ot_id}","ambos","${o.ot_numero} — Todo")'>
            ✓ Confirmar entrega completa (EPP + materiales)
          </button>
        </div>` : ''}
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('contenedor-ordenes').innerHTML = '<div class="empty">Error: '+e.message+'</div>';
  }
}

// ─── PREVENTIVOS ───────────────────────────────────────────────────

async function cargarPreventivos() {
  document.getElementById('contenedor-preventivos').innerHTML = '<div class="loading">Cargando...</div>';
  try {
    const data = await api('/panol/pedidos-preventivos') || [];
    const cont = document.getElementById('contenedor-preventivos');

    if (!data.length) {
      cont.innerHTML = '<div class="empty">Sin pedidos preventivos recientes</div>';
      return;
    }

    cont.innerHTML = data.map(p => `
      <div class="orden-card">
        <div class="orden-header">
          <div>
            <span style="font-size:14px;font-weight:700;color:var(--cel2);">${p.equipo_nombre}</span>
            <span style="font-size:12px;color:var(--txt3);margin-left:8px;">(${p.codigo_interno})</span>
          </div>
          <div>
            <span class="badge badge-warn">${p.proximo_plan} — ${p.proximas_horas} hs</span>
            <span style="font-size:11px;color:var(--txt3);margin-left:8px;">OT ${p.ot_numero} cerrada ${p.fecha_cierre}</span>
          </div>
        </div>
        <table class="tbl">
          <thead><tr><th>Código SAP</th><th>Descripción</th><th>Cantidad</th><th>Unidad</th></tr></thead>
          <tbody>
            ${p.materiales.map(m=>`<tr>
              <td style="color:var(--txt3);">${m.codigo_sap||'—'}</td>
              <td>${m.descripcion}</td>
              <td>${m.cantidad}</td>
              <td>${m.unidad}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('contenedor-preventivos').innerHTML = '<div class="empty">Error: '+e.message+'</div>';
  }
}

// ─── MODAL ENTREGA ─────────────────────────────────────────────────

function abrirEntrega(otId, tipo, titulo) {
  document.getElementById('entrega-ot-id').value = otId;
  document.getElementById('entrega-tipo').value = tipo;
  document.getElementById('entrega-titulo').textContent = 'Confirmar entrega — ' + titulo;
  document.getElementById('entrega-firma').value = '';
  document.getElementById('entrega-obs').value = '';
  document.getElementById('entrega-items').innerHTML =
    '<div class="alert-box" style="background:rgba(37,99,168,0.1);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--txt2);margin-bottom:14px;">'+
    'Al confirmar, se registra la entrega y el operador queda como receptor. Esta acción no se puede deshacer.</div>';
  document.getElementById('modal-entrega').classList.add('open');
}

async function confirmarEntrega() {
  const otId = document.getElementById('entrega-ot-id').value;
  const tipo = document.getElementById('entrega-tipo').value;
  const firma = document.getElementById('entrega-firma').value.trim();
  if (!firma) { alert('El nombre del operador es obligatorio'); return; }

  try {
    await api('/panol/entregas/'+otId+'/confirmar', {
      method: 'POST',
      body: JSON.stringify({
        tipo,
        firma_operario: firma,
        observaciones: document.getElementById('entrega-obs').value.trim(),
      })
    });
    alert('✓ Entrega confirmada.');
    cerrarModal();
    cargarOrdenes();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function verDetalleOT(otId) {
  try {
    const ot = await api('/panol/ots/'+otId);
    const estados = {borrador:'Borrador',pendiente_rrhh:'Pend. RRHH',autorizada:'Autorizada',en_ejecucion:'En ejecución',completada:'Completada'};
    alert(
      'OT: ' + ot.numero + '\n' +
      'Equipo: ' + ot.equipo_nombre + '\n' +
      'Mecánico: ' + (ot.mecanico_nombre||'—') + '\n' +
      'Personal: ' + (ot.cantidad_personal||'—') + '\n' +
      'Vehículo: ' + (ot.vehiculo_traslado||'—') + '\n' +
      'Estado: ' + (estados[ot.estado]||ot.estado)
    );
  } catch(e) {
    alert('Error: '+e.message);
  }
}

function cerrarModal() {
  document.getElementById('modal-entrega').classList.remove('open');
}

window.onclick = e => {
  if (e.target === document.getElementById('modal-entrega')) cerrarModal();
};

cargarOrdenes();
</script>
</body>
</html>
