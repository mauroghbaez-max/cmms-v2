<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTEN. — Equipo</title>
<style>
:root{
  --az1:#0a1628;--az2:#0d2240;--az3:#1a3a6b;--az4:#2563a8;
  --cel1:#378add;--cel2:#5ba3e8;--cel3:#b5d4f4;
  --txt1:#e8f0fc;--txt2:#94b8e0;--txt3:#5a7fa8;
  --ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --r:14px;--r-sm:10px;--border:rgba(55,138,221,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--az1);color:var(--txt1);font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif;font-style:italic;min-height:100vh;}
.topbar{background:var(--az2);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:700;color:var(--cel2);letter-spacing:0.12em;}
.btn-login{background:var(--az4);border:0.5px solid var(--cel1);color:var(--txt1);padding:6px 16px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;font-size:12px;}
.btn-login:hover{background:var(--cel1);}
.user-info{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:10px;}
.btn-salir{background:transparent;border:0.5px solid var(--border);color:var(--txt3);padding:5px 12px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;font-size:11px;}
main{padding:20px;max-width:800px;margin:0 auto;}
.equipo-header{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.equipo-nombre{font-size:22px;font-weight:700;color:var(--txt1);margin-bottom:4px;}
.equipo-codigo{font-size:13px;color:var(--cel2);letter-spacing:0.08em;margin-bottom:12px;}
.datos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dato{background:var(--az1);border-radius:var(--r-sm);padding:10px 14px;}
.dato label{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.dato span{font-size:13px;color:var(--txt1);}
.horometro-grande{font-size:28px;font-weight:700;color:var(--cel2);}
.section{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--cel3);margin-bottom:12px;}
.badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:20px;}
.badge-ok{background:rgba(16,185,129,0.15);color:var(--ok);border:0.5px solid rgba(16,185,129,0.3);}
.badge-warn{background:rgba(245,158,11,0.1);color:var(--warn);border:0.5px solid rgba(245,158,11,0.3);}
.badge-danger{background:rgba(239,68,68,0.1);color:var(--danger);border:0.5px solid rgba(239,68,68,0.3);}
.badge-rol{background:rgba(37,99,168,0.2);color:var(--cel2);border:0.5px solid rgba(91,163,232,0.25);}
.obs-box{background:var(--az1);border-left:3px solid var(--cel1);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 14px;margin-bottom:8px;}
.obs-rol{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.obs-texto{font-size:13px;color:var(--txt2);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:left;font-size:10px;color:var(--txt3);padding:6px 10px;border-bottom:0.5px solid var(--border);}
.tbl td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--txt1);}
.tbl tr:last-child td{border-bottom:none;}
.login-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}
.login-modal.show{display:flex;}
.login-box{background:var(--az2);border:0.5px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:360px;}
.login-box h3{color:var(--cel2);margin-bottom:18px;font-size:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;margin-bottom:5px;}
.field input{background:var(--az1);border:0.5px solid var(--border);border-radius:var(--r-sm);color:var(--txt1);padding:9px 12px;font-style:italic;font-family:inherit;font-size:13px;width:100%;}
.field input:focus{border-color:var(--cel1);outline:none;}
.empty{color:var(--txt3);font-size:13px;text-align:center;padding:16px;}
.loading{color:var(--txt3);font-size:13px;text-align:center;padding:24px;}
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:12px;margin-bottom:12px;}
.alert-warn{background:rgba(245,158,11,0.08);border:0.5px solid rgba(245,158,11,0.3);color:var(--warn);}
.ot-activa{background:rgba(37,99,168,0.15);border:0.5px solid var(--cel1);border-radius:var(--r-sm);padding:12px 16px;margin-bottom:8px;}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">MANTEN.</span>
  <div id="nav-user">
    <button class="btn-login" onclick="abrirLogin()">Ingresar</button>
  </div>
</div>

<main id="main">
  <div class="loading">Cargando información del equipo...</div>
</main>

<!-- Modal login -->
<div class="login-modal" id="login-modal">
  <div class="login-box">
    <h3>Ingresar al sistema</h3>
    <div class="field"><label>Usuario</label><input type="text" id="l-user" placeholder="usuario"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="contraseña" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="l-error" style="color:var(--danger);font-size:12px;margin-bottom:10px;display:none;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-salir" onclick="cerrarLogin()">Cancelar</button>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<script>
const API = 'https://cmms-v2-production.up.railway.app/api/v1';
const params = new URLSearchParams(window.location.search);
const codigo = params.get('codigo') || window.location.pathname.split('/').pop();
let token = localStorage.getItem('manten_token');
let user = JSON.parse(localStorage.getItem('manten_user') || 'null');

// Actualizar nav
function actualizarNav() {
  const nav = document.getElementById('nav-user');
  if (user) {
    nav.innerHTML = `<div class="user-info"><span>${user.nombre_completo}</span><button class="btn-salir" onclick="salir()">Salir</button></div>`;
  } else {
    nav.innerHTML = `<button class="btn-login" onclick="abrirLogin()">Ingresar</button>`;
  }
}

async function cargar() {
  if (!codigo) {
    document.getElementById('main').innerHTML = '<div class="empty">Código de equipo no especificado</div>';
    return;
  }

  if (token && user) {
    // Vista autorizada
    try {
      const r = await fetch(API + '/equipo/' + encodeURIComponent(codigo) + '/detalle', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (r.status === 401) { token = null; user = null; localStorage.clear(); cargar(); return; }
      const data = await r.json();
      renderAutorizado(data);
    } catch(e) {
      renderPublico(await cargarPublico());
    }
  } else {
    // Vista pública
    const data = await cargarPublico();
    if (data) renderPublico(data);
  }
}

async function cargarPublico() {
  try {
    const r = await fetch(API + '/publico/equipo/' + encodeURIComponent(codigo));
    if (!r.ok) { document.getElementById('main').innerHTML = '<div class="empty">Equipo no encontrado</div>'; return null; }
    return await r.json();
  } catch(e) {
    document.getElementById('main').innerHTML = '<div class="empty">Error de conexión</div>';
    return null;
  }
}

function renderPublico(d) {
  document.title = 'MANTEN. — ' + d.nombre;
  document.getElementById('main').innerHTML = `
    <div class="equipo-header">
      <div class="equipo-nombre">${d.nombre}</div>
      <div class="equipo-codigo">${d.codigo_interno}${d.codigo_sap ? ' · ' + d.codigo_sap : ''}</div>
      <div class="datos-grid">
        <div class="dato"><label>Marca / Modelo</label><span>${d.marca || '—'} ${d.modelo || ''}</span></div>
        <div class="dato"><label>Año</label><span>${d.anio || '—'}</span></div>
        <div class="dato"><label>Ubicación</label><span>${d.ubicacion || '—'}</span></div>
        <div class="dato"><label>Sector</label><span>${d.sector || '—'}</span></div>
      </div>
    </div>
    <div class="alert alert-warn">
      Para ver información completa (horómetro, historial, observaciones) ingresá con tu usuario.
    </div>
    <div style="text-align:center;padding:16px;">
      <button class="btn-login" onclick="abrirLogin()" style="font-size:14px;padding:10px 24px;">Ingresar para ver más</button>
    </div>
  `;
}

function renderAutorizado(d) {
  document.title = 'MANTEN. — ' + d.nombre;

  // Semáforo próximo servicio
  let semaforo = '';
  if (d.proximo_servicio) {
    const hs = d.proximo_servicio.hs_faltantes;
    if (hs <= 0) semaforo = '<span class="badge badge-danger">VENCIDO</span>';
    else if (hs <= d.proximo_servicio.horas_alerta) semaforo = '<span class="badge badge-warn">' + hs + ' hs para servicio</span>';
    else semaforo = '<span class="badge badge-ok">' + hs + ' hs para servicio</span>';
  }

  // Observaciones por rol
  const obs = [
    { rol: 'Relevador', texto: d.obs_relevador },
    { rol: 'Horometrista', texto: d.obs_horometrista },
    { rol: 'Operador', texto: d.obs_operador },
    { rol: 'Planificador', texto: d.obs_planificador },
  ].filter(o => o.texto);

  document.getElementById('main').innerHTML = `
    <div class="equipo-header">
      <div class="equipo-nombre">${d.nombre}</div>
      <div class="equipo-codigo">${d.codigo_interno}${d.codigo_sap ? ' · ' + d.codigo_sap : ''}</div>
      <div class="datos-grid">
        <div class="dato"><label>Marca / Modelo</label><span>${d.marca || '—'} ${d.modelo || ''}</span></div>
        <div class="dato"><label>Año</label><span>${d.anio || '—'}</span></div>
        <div class="dato"><label>Ubicación</label><span>${d.ubicacion || '—'}</span></div>
        <div class="dato"><label>Sector</label><span>${d.sector || '—'}</span></div>
        <div class="dato" style="grid-column:1/-1">
          <label>Horómetro actual</label>
          <span class="horometro-grande">${(d.horometro_actual || 0).toLocaleString()} hs</span>
          ${semaforo}
        </div>
      </div>
    </div>

    ${d.ot_activa ? `
    <div class="section">
      <div class="section-title">OT activa</div>
      <div class="ot-activa">
        <div style="font-weight:700;color:var(--cel2);">${d.ot_activa.numero}</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:4px;">Plan: ${d.ot_activa.plan || '—'} · Estado: ${d.ot_activa.estado}</div>
        <div style="font-size:12px;color:var(--txt2);">Mecánico: ${d.ot_activa.mecanico || '—'} · Apertura: ${d.ot_activa.fecha_apertura}</div>
      </div>
    </div>` : ''}

    ${d.proximo_servicio ? `
    <div class="section">
      <div class="section-title">Próximo servicio</div>
      <div class="datos-grid">
        <div class="dato"><label>Plan</label><span>${d.proximo_servicio.plan}</span></div>
        <div class="dato"><label>Horas hito</label><span>${d.proximo_servicio.horas_hito} hs</span></div>
        <div class="dato" style="grid-column:1/-1"><label>Horas faltantes</label><span>${d.proximo_servicio.hs_faltantes} hs</span></div>
      </div>
    </div>` : ''}

    ${d.ultimo_servicio ? `
    <div class="section">
      <div class="section-title">Último servicio</div>
      <div class="datos-grid">
        <div class="dato"><label>OT</label><span>${d.ultimo_servicio.numero}</span></div>
        <div class="dato"><label>Plan</label><span>${d.ultimo_servicio.plan || '—'}</span></div>
        <div class="dato"><label>Horómetro apertura</label><span>${d.ultimo_servicio.horometro_apertura || '—'} hs</span></div>
        <div class="dato"><label>Horómetro cierre</label><span>${d.ultimo_servicio.horometro_cierre || '—'} hs</span></div>
        <div class="dato"><label>Mecánico</label><span>${d.ultimo_servicio.mecanico || '—'}</span></div>
        <div class="dato"><label>Fecha cierre</label><span>${d.ultimo_servicio.fecha_cierre}</span></div>
        ${d.ultimo_servicio.observaciones ? `<div class="dato" style="grid-column:1/-1"><label>Observaciones cierre</label><span>${d.ultimo_servicio.observaciones}</span></div>` : ''}
      </div>
    </div>` : ''}

    ${obs.length ? `
    <div class="section">
      <div class="section-title">Observaciones del equipo</div>
      ${obs.map(o => `
        <div class="obs-box">
          <div class="obs-rol">${o.rol}</div>
          <div class="obs-texto">${o.texto}</div>
        </div>
      `).join('')}
    </div>` : ''}

    ${d.historial && d.historial.length ? `
    <div class="section">
      <div class="section-title">Historial de servicios</div>
      <table class="tbl">
        <thead><tr><th>OT</th><th>Plan</th><th>Hs apertura</th><th>Hs cierre</th><th>Mecánico</th><th>Fecha cierre</th></tr></thead>
        <tbody>
          ${d.historial.map(h => `<tr>
            <td style="color:var(--cel2);">${h.numero}</td>
            <td>${h.plan || '—'}</td>
            <td>${h.horometro_apertura || '—'}</td>
            <td>${h.horometro_cierre || '—'}</td>
            <td>${h.mecanico || '—'}</td>
            <td style="color:var(--txt3);">${h.fecha_cierre}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

// LOGIN
function abrirLogin() { document.getElementById('login-modal').classList.add('show'); }
function cerrarLogin() { document.getElementById('login-modal').classList.remove('show'); }

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const err = document.getElementById('l-error');
  err.style.display = 'none';
  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      body: new URLSearchParams({ username, password })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.detail || 'Error al ingresar'; err.style.display = 'block'; return; }
    token = d.access_token;
    user = { id: d.id, nombre_completo: d.nombre_completo, rol: d.rol };
    localStorage.setItem('manten_token', token);
    localStorage.setItem('manten_user', JSON.stringify(user));
    cerrarLogin();
    actualizarNav();
    cargar();
  } catch(e) {
    err.textContent = 'Error de conexión'; err.style.display = 'block';
  }
}

function salir() {
  token = null; user = null;
  localStorage.removeItem('manten_token');
  localStorage.removeItem('manten_user');
  actualizarNav();
  cargar();
}

actualizarNav();
cargar();
</script>
</body>
</html>
