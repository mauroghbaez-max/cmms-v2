<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANTEN. v2.0</title>
<style>
:root {
  --az1:#0a1628;--az2:#0d2240;--az3:#1a3a6b;--az4:#2563a8;
  --cel1:#378add;--cel2:#5ba3e8;--cel3:#b5d4f4;--cel4:#e6f1fb;
  --txt1:#e8f0fc;--txt2:#94b8e0;--txt3:#5a7fa8;
  --ok:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --r:14px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--az1);color:var(--txt1);font-family:'Arial Narrow','Helvetica Neue',Arial,sans-serif;font-style:italic;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:400px;padding:20px;}
.logo{font-size:42px;font-weight:700;color:var(--cel2);letter-spacing:0.15em;text-align:center;margin-bottom:6px;}
.tagline{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:40px;letter-spacing:0.05em;}
.card{background:var(--az2);border:0.5px solid rgba(55,138,221,0.2);border-radius:var(--r);padding:32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.field input{width:100%;background:var(--az1);border:0.5px solid rgba(55,138,221,0.2);border-radius:var(--r-sm);color:var(--txt1);font-size:14px;padding:10px 14px;outline:none;font-style:italic;font-family:inherit;}
.field input:focus{border-color:var(--cel1);}
.btn-login{width:100%;background:var(--az4);border:0.5px solid var(--cel1);color:var(--txt1);font-size:14px;font-weight:700;padding:12px;border-radius:var(--r-sm);cursor:pointer;font-style:italic;font-family:inherit;letter-spacing:0.05em;margin-top:6px;}
.btn-login:hover{background:var(--cel1);}
.error{color:var(--danger);font-size:12px;text-align:center;margin-top:12px;display:none;}
.version{font-size:11px;color:var(--txt3);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">MANTEN.</div>
  <div class="tagline">Sistema de Gestión de Mantenimiento Industrial</div>
  <div class="card">
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="login()">Ingresar</button>
    <div class="error" id="error-msg">Usuario o contraseña incorrectos</div>
  </div>
  <div class="version">v2.0.0 — MANTEN. Sistema Industrial</div>
</div>
<script>
const API = 'https://cmms-v2-production.up.railway.app/api/v1';

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return;
  const btn = document.querySelector('.btn-login');
  btn.textContent = 'Ingresando...';
  btn.disabled = true;
  try {
    const form = new FormData();
    form.append('username', username);
    form.append('password', password);
    const r = await fetch(API + '/auth/login', { method: 'POST', body: form });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Error');
    localStorage.setItem('manten_token', data.access_token);
    localStorage.setItem('manten_user', JSON.stringify({ id: data.id, nombre_completo: data.nombre_completo, rol: data.rol }));
    const destinos = {
      admin: 'admin.html',
      planificador: 'planificador.html',
      rrhh: 'rrhh.html',
      panol: 'panol.html',
      horometrista: 'horometrista.html',
      relevador: 'relevador.html',
      operario: 'operario.html',
      inspector: 'equipo.html',
      gerencia: 'equipo.html',
    };
    window.location.href = destinos[data.rol] || 'index.html';
  } catch(e) {
    document.getElementById('error-msg').style.display = 'block';
    btn.textContent = 'Ingresar';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
